[build]
  command   = "CI=false npm run build"
  publish   = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS    = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
